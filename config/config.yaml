# Yahoo Fantasy Baseball Tracker Configuration

# League Settings
league_id: "YOUR_LEAGUE_ID_HERE"  # Find this in your league URL
game_code: "mlb"
season: 2025

# Data Collection Settings
collection_time: "02:00"  # Time to run daily collection (24hr format)
timezone: "America/Los_Angeles"  # Adjust to your timezone

# Database Settings
database_path: "data/fantasy_baseball.db"

# Export Settings
export_directory: "data/exports"
export_formats:
  - csv
  - json

# Analysis Settings
stats_categories:
  batting:
    - R    # Runs
    - HR   # Home Runs
    - RBI  # Runs Batted In
    - SB   # Stolen Bases
    - AVG  # Batting Average
  pitching:
    - W    # Wins
    - K    # Strikeouts
    - SV   # Saves
    - ERA  # Earned Run Average
    - WHIP # Walks + Hits per Inning Pitched

# Logging
log_level: "INFO"
log_file: "logs/tracker.log"

# API Settings
api_delay_seconds: 0.5  # Delay between API calls to be respectful
max_retries: 3
